services:
  # Backend Service
  - type: web
    name: sbe-backend-prod
    env: node
    plan: starter
    region: singapore # Optimized for Indian users
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: sbe/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sbe-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # Frontend Service (Alternative to Vercel if needed, but keeping it for completeness)
  - type: web
    name: sbe-frontend-prod
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: sbe/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: sbe-backend-prod
          property: host

databases:
  - name: sbe-db
    plan: free
    region: singapore
