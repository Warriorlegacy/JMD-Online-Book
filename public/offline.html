<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | JMD Online Book</title>
    <style>
        body {
            background-color: #080b12;
            color: #94a3b8;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f59e0b; margin-bottom: 8px; }
        p { max-width: 400px; line-height: 1.5; }
        .retry-btn {
            background: #f59e0b;
            color: #080b12;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 24px;
            transition: transform 0.2s;
        }
        .retry-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>You're Offline</h1>
    <p>Please check your internet connection to continue using JMD Online Book. Most features require a live connection to manage your wallet and games.</p>
    <a href="/" class="retry-btn">Retry Connection</a>
</body>
</html>
