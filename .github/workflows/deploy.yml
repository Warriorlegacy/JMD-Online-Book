name: SBE Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './sbe/web/package-lock.json'

      - name: Install dependencies
        run: |
          cd sbe/backend && npm install
          cd ../web && npm install

      - name: Lint & Typecheck (Web)
        run: |
          cd sbe/web && npm run lint

      - name: Build Backend (Transpilation check)
        run: |
          cd sbe/backend && npx tsc

      - name: Build Web (Next.js)
        run: |
          cd sbe/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: './sbe/web'

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      # Placeholder for Render/Koyeb/Railway CLI deploy
      - name: Deploy to Cloud
        run: echo "Starting Backend Deployment to Managed Cloud..."
