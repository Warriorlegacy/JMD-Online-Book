name: SBE Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sbe
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            sbe/backend/package-lock.json
            sbe/web/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./sbe/backend
        run: npm ci

      - name: Install Web Dependencies
        working-directory: ./sbe/web
        run: npm ci

      - name: Lint Web
        working-directory: ./sbe/web
        run: npm run lint || true

      - name: Build Backend
        working-directory: ./sbe/backend
        run: npm run build

      - name: Build Web
        working-directory: ./sbe/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./sbe/web

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      
      - name: Deploy Backend
        run: |
          echo "Backend deployment configured per your cloud provider"
          echo "Current working directory: $(pwd)"
          ls -la sbe/backend/dist || echo "Build output not found"
