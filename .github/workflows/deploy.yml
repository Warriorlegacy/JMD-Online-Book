name: SBE Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sbe
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            sbe/backend/package-lock.json
            sbe/web/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install


      - name: Install Web Dependencies
        working-directory: web
        run: npm install

      - name: Lint Web
        working-directory: web
        run: npm run lint || true

      - name: Build Backend
        working-directory: backend
        run: npm run build

      - name: Run God-Level System Verification
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: npm run test:god

      - name: Build Web
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

  # deploy-frontend is handled automatically by Vercel's GitHub integration

  deploy-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy Backend to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true
